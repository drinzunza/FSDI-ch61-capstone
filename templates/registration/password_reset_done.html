{% extends 'base.html' %}

{% load static %}

{% block css %}
  <link rel="stylesheet" href="{% static 'css/users.css' %}">
{% endblock %}

{% block title %}
  Check your email
{% endblock %}

{% block content %}
  <div class="container auth-wrap">
    <div class="auth-card">
      <h1>Check your email</h1>
      <p class="helper-text">If an account exists for that email, we’ve sent a reset link. It should arrive shortly.</p>
      <a class="btn btn-outline-primary w-100" href="{% url 'login' %}">Back to login</a>
    </div>
  </div>
{% endblock %}
