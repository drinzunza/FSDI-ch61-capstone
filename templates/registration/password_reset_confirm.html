{% extends 'base.html' %}

{% load static %}
{% load django_bootstrap5 %}

{% block css %}
  <link rel="stylesheet" href="{% static 'css/users.css' %}">
{% endblock %}

{% block title %}
  Set new password
{% endblock %}

{% block content %}
  <div class="container auth-wrap">
    <div class="auth-card">
      <h1>Create a new password</h1>
      <p class="helper-text">Enter a new password for your account.</p>

      <form method="post">
        {% csrf_token %}
        {% bootstrap_form form %}
        <button class="btn btn-primary w-100">Update password</button>
      </form>
    </div>
  </div>
{% endblock %}
