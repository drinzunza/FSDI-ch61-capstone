{% extends 'base.html' %}

{% load static%}
{% load django_bootstrap5 %}
{% block css %}
  <link rel="stylesheet" href="{% static 'css/users.css' %}">
{% endblock%}

{% block title %}
  Login
{% endblock %}

{% block content %}
  <div class="container auth-wrap">
    <div class="auth-card">
      <h1>Welcome back</h1>
      <p class="helper-text">Sign in to continue your work.</p>

      <form method="post">
          {% csrf_token %}

          {% bootstrap_form form %}

          <div class="auth-actions">
            <button class="btn btn-primary px-4">Login</button>
            <a class="link-muted" href="{% url 'signup' %}">Need an account?</a>
          </div>
      </form>
    </div>
  </div>
{% endblock %}
